services:
  # Web Service (FastAPI Backend)
  - type: web
    name: akunuba-backend
    env: python
    region: oregon # Options: oregon, frankfurt, singapore, mumbai, tokyo
    plan: starter # Options: free, starter, standard, pro
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Application Settings
      - key: APP_NAME
        value: Akunuba Backend
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_VERSION
        value: 1.0.0
      - key: API_V1_PREFIX
        value: /api/v1
      - key: HOST
        value: 0.0.0.0

      # CORS Origins - Update with your frontend URLs
      - key: CORS_ORIGINS
        value: https://yourdomain.com,https://www.yourdomain.com,http://localhost:3000/

      # Database - Render will auto-inject DATABASE_URL if using Render PostgreSQL
      # If using external database, set it manually
      - key: DATABASE_URL
        sync: false # Set this manually in Render dashboard

      # Redis - REQUIRED for real-time WebSocket delivery (chat + notifications).
      # Without it the app falls back to redis://localhost:6379, which does not
      # exist on Render, and real-time fan-out silently degrades.
      - key: REDIS_URL
        sync: false # Set this manually in Render dashboard (e.g. Redis Cloud URL)

      # Supabase Configuration
      - key: SUPABASE_URL
        sync: false # Set this manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false # Set this manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set this manually in Render dashboard
      - key: SUPABASE_JWT_SECRET
        sync: false # Set this manually in Render dashboard

      # Security
      - key: SECRET_KEY
        generateValue: true # Render will generate a secure key
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440

      # Email Service (Mailpit API)
      - key: MAILPIT_API_BASE_URL
        sync: false # e.g. https://mailpit.example.com
      - key: MAILPIT_API_USERNAME
        sync: false # Optional basic auth username
      - key: MAILPIT_API_PASSWORD
        sync: false # Optional basic auth password
      - key: EMAIL_FROM_ADDRESS
        value: noreply@yourdomain.com
      - key: EMAIL_FROM_NAME
        value: Akunuba
      - key: EMAIL_ENABLED
        value: true
      - key: EMAIL_RETURN_OTP_ON_FAILURE
        value: true

      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false # Set this manually in Render dashboard
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false # Set this manually in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # Set this manually in Render dashboard

      # Plaid
      - key: PLAID_CLIENT_ID
        sync: false # Set this manually in Render dashboard
      - key: PLAID_SECRET_KEY
        sync: false # Set this manually in Render dashboard
      - key: PLAID_PUBLIC_KEY
        sync: false # Set this manually in Render dashboard
      - key: PLAID_ENV
        value: sandbox

      # Stripe subscription billing
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # Signing secret of the endpoint in Stripe > Developers > Webhooks.
                    # Editing an endpoint's URL keeps this secret; creating a new one does not.
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false # lookup_key akunuba_starter_monthly
      - key: STRIPE_PRICE_STARTER_ANNUAL
        sync: false # lookup_key akunuba_starter_annual
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false # lookup_key akunuba_pro_monthly
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false # lookup_key akunuba_pro_annual
      - key: STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false # lookup_key akunuba_premium_monthly
      - key: STRIPE_PRICE_PREMIUM_ANNUAL
        sync: false # lookup_key akunuba_premium_annual

      # Persona
      - key: PERSONA_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: PERSONA_USE_REDIRECT_URI
        sync: false # "true" only after the redirect URI is allowlisted in Persona
      - key: PERSONA_WEBHOOK_SECRET
        sync: false # HMAC secret; the Persona webhook fails closed without it
      - key: PERSONA_TEMPLATE_ID
        sync: false # Set this manually in Render dashboard
      - key: PERSONA_ENVIRONMENT_ID
        sync: false # Sandbox env ID from Persona dashboard (starts with env_)
      - key: PERSONA_FILE_ACCESS_TOKEN_EXPIRY
        value: 21600
      - key: PERSONA_REDIRECT_URI
        sync: false # Must exactly match Persona template allowed redirect URI

      # Sendbird
      - key: SENDBIRD_APP_ID
        sync: false # Set this manually in Render dashboard
      - key: SENDBIRD_API_TOKEN
        sync: false # Set this manually in Render dashboard

      # Polygon (Optional)
      - key: POLYGON_API_KEY
        sync: false # Set this manually in Render dashboard

      # Alpaca (Optional)
      - key: ALPACA_OAUTH_ENABLED
        value: false

      # PostHog (Optional)
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com

  # PostgreSQL Database (Optional - if you want to use Render's managed PostgreSQL)
  # NOTE: resource names kept as "fullego" on purpose — renaming them in a
  # blueprint makes Render provision a NEW empty database instead of reusing
  # the existing one. Rename only via the Render dashboard, if ever.
  - type: pg
    name: fullego-database
    plan: starter # Options: starter, standard, pro
    databaseName: fullego
    user: fullego_user
